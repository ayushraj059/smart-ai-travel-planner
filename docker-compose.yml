version: '3.8'

services:
  database:
    build:
      context: ./backend/database
    ports:
      - "8000:8000"
    env_file: ./backend/database/.env
    volumes:
      - ./data:/data:ro
    restart: unless-stopped

  auth-service:
    build:
      context: ./backend/auth-service
    ports:
      - "8001:8001"
    env_file: ./backend/auth-service/.env
    restart: unless-stopped

  rag:
    build:
      context: ./backend/rag
    ports:
      - "8002:8002"
    env_file: ./backend/rag/.env
    restart: unless-stopped

  user-details:
    build:
      context: ./backend/user_details
    ports:
      - "8003:8003"
    env_file: ./backend/user_details/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AUTH_URL: http://localhost:8001
        VITE_RAG_URL: http://localhost:8002
        VITE_USER_DETAILS_URL: http://localhost:8003
        VITE_DATABASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - auth-service
      - rag
      - user-details
      - database
    restart: unless-stopped
